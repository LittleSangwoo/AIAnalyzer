version: '3.8'

services:
  analyzer-web:
    build:
      context: ..
      dockerfile: AIAnalyzer/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ollama-server

  ollama-server:
    image: ollama/ollama:latest
    container_name: aianalyzer-ollama-server-1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      
volumes:
  ollama_data: